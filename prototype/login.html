<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CardDemo</title>
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card__title">💳 CardDemo</div>
    <div class="login-card__subtitle">Mainframe Credit Card Management System</div>
    <div id="login-error" class="alert alert--error hidden"></div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-group__label" for="userId">User ID <span class="required">*</span></label>
        <input type="text" id="userId" class="form-group__input" placeholder="e.g. ADMIN001" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-group__label" for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" class="form-group__input" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn--primary w-full btn--lg" style="margin-top:1rem">Sign In</button>
    </form>
    <div style="margin-top:1.5rem; padding:1rem; background:#f5f5f5; border-radius:8px; font-size:0.75rem; color:#757575;">
      <strong>Demo credentials:</strong><br>
      Admin: ADMIN001 / ADMIN001<br>
      User: USER0001 / PASS0001
    </div>
  </div>
</div>
<script src="scripts/mock-data.js"></script>
<script src="scripts/utils.js"></script>
<script>
function handleLogin(e) {
  e.preventDefault();
  const userId = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl = document.getElementById('login-error');
  
  const user = mockData.users.find(u => u.id === userId && u.password === password);
  if (user) {
    mockData.currentUser = user;
    sessionStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'dashboard.html';
  } else {
    errEl.textContent = 'Invalid user ID or password. Please try again.';
    errEl.classList.remove('hidden');
  }
}
</script>
</body>
</html>
