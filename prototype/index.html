<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - CardDemo</title>
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-surface); }
    .login-card { background: var(--color-background); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-lg); padding: var(--space-10); width: 100%; max-width: 420px; }
    .login-logo { text-align: center; font-size: 3rem; margin-bottom: var(--space-2); }
    .login-title { text-align: center; font-size: var(--font-size-2xl); font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-2); }
    .login-subtitle { text-align: center; color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-bottom: var(--space-8); }
    .login-error { display: none; background: color-mix(in srgb, var(--color-error) 10%, transparent); border: 1px solid var(--color-error); color: var(--color-error); padding: var(--space-3) var(--space-4); border-radius: var(--border-radius-sm); margin-bottom: var(--space-4); font-size: var(--font-size-sm); }
    .login-error.is-visible { display: block; }
    .demo-creds { background: var(--color-surface); border-radius: var(--border-radius-sm); padding: var(--space-4); margin-top: var(--space-6); font-size: var(--font-size-xs); color: var(--color-text-secondary); }
    .demo-creds strong { color: var(--color-text-primary); }
    .demo-creds table { width: 100%; margin-top: var(--space-2); }
    .demo-creds td { padding: var(--space-1) var(--space-2); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">💳</div>
      <h1 class="login-title">CardDemo</h1>
      <p class="login-subtitle">Credit Card Management System</p>

      <div class="login-error" id="loginError" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-group__label" for="userId">User ID</label>
          <input class="form-group__input" type="text" id="userId" name="userId"
                 maxlength="8" autocomplete="username" placeholder="Enter User ID (8 chars)"
                 required>
          <span class="form-group__error" id="userIdError"></span>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="password">Password</label>
          <input class="form-group__input" type="password" id="password" name="password"
                 maxlength="8" autocomplete="current-password" placeholder="Enter Password"
                 required>
          <span class="form-group__error" id="passwordError"></span>
        </div>

        <button type="submit" class="btn btn--primary" style="width:100%;margin-top:var(--space-4)">
          Sign In
        </button>
      </form>

      <div class="demo-creds">
        <strong>Demo Credentials:</strong>
        <table>
          <tr><td>USER0001 / USER0001</td><td><span class="badge badge--info">Regular</span></td></tr>
          <tr><td>USER0002 / USER0002</td><td><span class="badge badge--info">Regular</span></td></tr>
          <tr><td>ADMIN001 / ADMIN001</td><td><span class="badge badge--warning">Admin</span></td></tr>
          <tr><td>ADMIN002 / ADMIN002</td><td><span class="badge badge--warning">Admin</span></td></tr>
        </table>
      </div>
    </div>
  </div>

  <script src="scripts/mock-data.js"></script>
  <script src="scripts/utils.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim().toUpperCase();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');

      errorEl.classList.remove('is-visible');
      errorEl.textContent = '';

      let hasError = false;
      if (!userId) {
        document.getElementById('userIdError').textContent = 'User ID is required';
        hasError = true;
      } else {
        document.getElementById('userIdError').textContent = '';
      }
      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        hasError = true;
      } else {
        document.getElementById('passwordError').textContent = '';
      }
      if (hasError) return;

      const user = mockData.users.find(u => u.userId.toUpperCase() === userId && u.password === password);
      if (!user) {
        errorEl.textContent = 'Invalid User ID or Password. Please try again.';
        errorEl.classList.add('is-visible');
        document.getElementById('password').value = '';
        return;
      }

      mockData.session = {
        userId: user.userId,
        userType: user.userType,
        userName: user.firstName + ' ' + user.lastName,
        cardNum: mockData.creditCards.find(c => c.acctId === mockData.accounts[0].acctId)?.cardNum || '',
        acctId: mockData.accounts[0]?.acctId || ''
      };

      window.location.href = 'dashboard.html';
    });

    document.querySelectorAll('.demo-creds td:first-child').forEach(td => {
      td.style.cursor = 'pointer';
      td.title = 'Click to use these credentials';
      td.addEventListener('click', function() {
        const parts = this.textContent.split(' / ');
        if (parts.length === 2) {
          document.getElementById('userId').value = parts[0].trim();
          document.getElementById('password').value = parts[1].trim();
        }
      });
    });
  </script>
</body>
</html>
